<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>WhatsApp</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --wa-green: #075e54;
  --wa-green-dark: #054d44;
  --wa-teal: #128c7e;
  --wa-light-green: #25d366;
  --wa-blue: #34b7f1;
  --wa-sender: #dcf8c6;
  --wa-receiver: #ffffff;
  --wa-bg: #efeae2;
  --wa-chat-bg: #e5ddd5;
  --wa-text: #111b21;
  --wa-text-secondary: #667781;
  --wa-border: #e9edef;
  --wa-input-bg: #ffffff;
  --wa-header-bg: #075e54;
  --wa-tick: #53bdeb;
  --wa-time: #667781;
  --wa-time-sender: #4a9c6d;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  font-size: 16px;
  background: var(--wa-bg);
  color: var(--wa-text);
}

/* ═══ CHAT LIST VIEW ═══ */
.chat-list-view {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: #fff;
}

.chat-list-header {
  background: var(--wa-header-bg);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 56px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.chat-list-header h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 0.2px;
}

.header-icons {
  display: flex;
  gap: 20px;
  align-items: center;
}

.header-icons span {
  font-size: 20px;
  cursor: pointer;
  opacity: 0.9;
}

/* Search bar */
.search-bar {
  padding: 6px 12px;
  background: #f0f2f5;
}

.search-bar input {
  width: 100%;
  padding: 8px 32px 8px 36px;
  border: none;
  border-radius: 8px;
  background: #fff;
  font-size: 15px;
  color: var(--wa-text);
  outline: none;
}

.search-bar input::placeholder {
  color: var(--wa-text-secondary);
}

/* Filter tabs */
.filter-tabs {
  display: flex;
  gap: 8px;
  padding: 8px 12px;
  background: #fff;
  border-bottom: 1px solid var(--wa-border);
  overflow-x: auto;
}

.filter-tab {
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  background: #f0f2f5;
  color: var(--wa-text);
  border: none;
}

.filter-tab.active {
  background: #d9fdd3;
  color: var(--wa-wa-green);
}

/* Chat list */
.chat-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.chat-item {
  display: flex;
  align-items: center;
  padding: 12px 16px;
  gap: 12px;
  cursor: pointer;
  border-bottom: 1px solid #f0f2f5;
  transition: background 0.15s;
}

.chat-item:active {
  background: #f0f2f5;
}

.chat-avatar {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 600;
  color: #fff;
}

.chat-info {
  flex: 1;
  min-width: 0;
}

.chat-info-top {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 2px;
}

.chat-name {
  font-size: 16.5px;
  font-weight: 400;
  color: var(--wa-text);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chat-time {
  font-size: 12px;
  color: var(--wa-text-secondary);
  flex-shrink: 0;
  margin-left: 8px;
}

.chat-time.unread {
  color: var(--wa-light-green);
}

.chat-preview {
  font-size: 14px;
  color: var(--wa-text-secondary);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 3px;
}

.chat-preview .ticks {
  color: var(--wa-tick);
  font-size: 16px;
  flex-shrink: 0;
}

.unread-badge {
  background: var(--wa-light-green);
  color: #fff;
  font-size: 11px;
  font-weight: 600;
  min-width: 20px;
  height: 20px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 5px;
  flex-shrink: 0;
}

.chat-preview-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

/* ═══ CHAT VIEW ═══ */
.chat-view {
  display: none;
  flex-direction: column;
  height: 100%;
  max-width: 500px;
  margin: 0 auto;
  background: var(--wa-chat-bg);
}

.chat-view.active {
  display: flex;
}

.chat-list-view.hidden {
  display: none;
}

/* Chat header */
.chat-header {
  background: var(--wa-header-bg);
  color: #fff;
  padding: 8px 8px 8px 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  min-height: 56px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.back-btn {
  font-size: 22px;
  cursor: pointer;
  padding: 4px 4px 4px 8px;
  display: flex;
  align-items: center;
}

.chat-header-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  flex-shrink: 0;
}

.chat-header-info {
  flex: 1;
  min-width: 0;
}

.chat-header-name {
  font-size: 16.5px;
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.chat-header-status {
  font-size: 12.5px;
  opacity: 0.85;
}

.chat-header-icons {
  display: flex;
  gap: 18px;
  margin-left: auto;
  padding-right: 8px;
}

.chat-header-icons span {
  font-size: 20px;
  cursor: pointer;
}

/* Chat wallpaper */
.chat-wallpaper {
  position: relative;
  flex: 1;
  overflow: hidden;
}

.chat-wallpaper::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='p' width='40' height='40' patternUnits='userSpaceOnUse'%3E%3Cpath d='M20 5 Q25 0 30 5 Q35 10 30 15 Q25 20 20 15 Q15 10 20 5Z' fill='%23d4cdc4' opacity='0.15'/%3E%3Ccircle cx='8' cy='32' r='3' fill='%23d4cdc4' opacity='0.1'/%3E%3C/pattern%3E%3C/defs%3E%3Crect width='200' height='200' fill='url(%23p)'/%3E%3C/svg%3E");
  opacity: 0.6;
  z-index: 0;
}

/* Messages area */
.messages {
  position: relative;
  z-index: 1;
  height: 100%;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 8px 16px 8px 12px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

/* Date separator */
.date-sep {
  text-align: center;
  margin: 8px 0;
}

.date-sep span {
  background: #e1f2fb;
  color: var(--wa-text);
  font-size: 12.5px;
  padding: 5px 12px;
  border-radius: 8px;
  display: inline-block;
  box-shadow: 0 1px 1px rgba(0,0,0,0.06);
}

/* Message bubbles */
.msg {
  max-width: 80%;
  padding: 6px 8px 4px 9px;
  border-radius: 8px;
  position: relative;
  margin: 1px 0;
  line-height: 1.35;
  word-wrap: break-word;
  box-shadow: 0 1px 0.5px rgba(0,0,0,0.08);
}

.msg-sent {
  background: var(--wa-sender);
  align-self: flex-end;
  border-top-right-radius: 0;
}

.msg-sent:first-of-type,
.msg-sent.tail {
  border-top-right-radius: 0;
}

.msg-received {
  background: var(--wa-receiver);
  align-self: flex-start;
  border-top-left-radius: 0;
}

.msg-text {
  font-size: 14.5px;
  color: var(--wa-text);
  padding-right: 52px;
}

.msg-meta {
  float: right;
  display: flex;
  align-items: center;
  gap: 3px;
  margin-top: 2px;
  margin-left: 8px;
  position: relative;
  top: 4px;
}

.msg-time {
  font-size: 11px;
  color: var(--wa-time);
}

.msg-sent .msg-time {
  color: var(--wa-time-sender);
}

.msg-ticks {
  font-size: 15px;
  color: var(--wa-tick);
  line-height: 1;
}

/* Tail triangles */
.msg-sent.tail::after {
  content: '';
  position: absolute;
  top: 0;
  right: -8px;
  width: 0;
  height: 0;
  border-left: 8px solid var(--wa-sender);
  border-bottom: 8px solid transparent;
}

.msg-received.tail::after {
  content: '';
  position: absolute;
  top: 0;
  left: -8px;
  width: 0;
  height: 0;
  border-right: 8px solid var(--wa-receiver);
  border-bottom: 8px solid transparent;
}

/* Group sender name */
.msg-sender {
  font-size: 12.5px;
  font-weight: 500;
  margin-bottom: 1px;
  color: #06cf9c;
}

/* ═══ INPUT BAR ═══ */
.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  padding: 5px 6px;
  background: var(--wa-chat-bg);
  position: sticky;
  bottom: 0;
  z-index: 10;
}

.input-container {
  flex: 1;
  display: flex;
  align-items: flex-end;
  background: var(--wa-input-bg);
  border-radius: 24px;
  padding: 4px 8px;
  min-height: 44px;
  gap: 4px;
}

.input-left {
  display: flex;
  align-items: center;
  padding: 6px 2px;
}

.input-left span {
  font-size: 22px;
  cursor: pointer;
  color: var(--wa-text-secondary);
}

.msg-input {
  flex: 1;
  border: none;
  outline: none;
  font-size: 16px;
  font-family: inherit;
  color: var(--wa-text);
  background: transparent;
  resize: none;
  max-height: 120px;
  min-height: 24px;
  line-height: 1.35;
  padding: 6px 0;
  overflow-y: auto;
}

.msg-input::placeholder {
  color: var(--wa-text-secondary);
}

.input-right {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 2px;
}

.input-right span {
  font-size: 22px;
  cursor: pointer;
  color: var(--wa-text-secondary);
}

.send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--wa-teal);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  font-size: 20px;
  color: #fff;
  transition: background 0.15s;
}

.send-btn:active {
  background: var(--wa-green-dark);
}

.mic-btn {
  display: flex;
}

.send-icon {
  display: none;
}

.has-text .mic-btn {
  display: none;
}

.has-text .send-icon {
  display: flex;
}

/* ═══ FAB ═══ */
.fab {
  position: fixed;
  bottom: 80px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 16px;
  background: var(--wa-teal);
  color: #fff;
  font-size: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  cursor: pointer;
  z-index: 5;
}

/* ═══ BOTTOM NAV (chat list view) ═══ */
.bottom-nav {
  display: flex;
  background: #fff;
  border-top: 1px solid var(--wa-border);
  padding: 6px 0 env(safe-area-inset-bottom, 8px);
}

.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 6px 0;
  cursor: pointer;
  color: var(--wa-text-secondary);
  font-size: 12px;
}

.nav-item.active {
  color: var(--wa-teal);
}

.nav-item span.nav-icon {
  font-size: 22px;
}

/* Scrollbar */
.messages::-webkit-scrollbar, .chat-list::-webkit-scrollbar {
  width: 4px;
}
.messages::-webkit-scrollbar-thumb, .chat-list::-webkit-scrollbar-thumb {
  background: rgba(0,0,0,0.15);
  border-radius: 2px;
}

/* Ensure mobile viewport */
@supports (padding: env(safe-area-inset-bottom)) {
  .input-bar { padding-bottom: calc(5px + env(safe-area-inset-bottom)); }
  .bottom-nav { padding-bottom: calc(6px + env(safe-area-inset-bottom)); }
}
</style>
</head>

<!-- ═══ CHAT LIST VIEW ═══ -->
<div class="chat-list-view" id="chatListView">

    <div class="header-icons">
      <span>📷</span>
      <span>🔍</span>
      <span>⋮</span>
    </div>
  </div>

  <div class="search-bar">
    <input type="text" placeholder="🔍 Ask Meta AI or Search">

  <div class="filter-tabs">

<!-- ═══ CHAT VIEW ═══ -->
<div class="chat-view" id="chatView">

    <div class="chat-header-avatar" id="chatAvatar"></div>
    <div class="chat-header-info">

      <div class="chat-header-status" id="chatStatus">online</div>
    </div>
    <div class="chat-header-icons">

  <div class="chat-wallpaper">

  <div class="input-bar">

    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <span class="mic-btn">🎤</span>
      <span class="send-icon">➤</span>
    </button>
  </div>
</div>

// ═══ RENDER CHAT LIST ═══
function renderChatList() {
  const list = document.getElementById('chatList');
  list.innerHTML = chats.map(chat => `
    <div class="chat-item" onclick="openChat(${chat.id})">
      <div class="chat-avatar" style="background:${chat.color}">${chat.avatar}</div>
      <div class="chat-info">
        <div class="chat-info-top">
          <div class="chat-name">${chat.name}</div>
          <div class="chat-time ${chat.unread ? 'unread' : ''}">${chat.time}</div>
        </div>
        <div class="chat-preview-row">
          <div class="chat-preview">
            ${chat.ticks && !chat.unread ? `<span class="ticks">${chat.ticks}</span>` : ''}
            ${chat.preview}
          </div>
          ${chat.unread ? `<div class="unread-badge">${chat.unread}</div>` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

// ═══ OPEN CHAT ═══
let currentChat = null;

function openChat(id) {
  currentChat = chats.find(c => c.id === id);
  if (!currentChat) return;

  document.getElementById('chatListView').classList.add('hidden');
  document.getElementById('chatView').classList.add('active');
  document.getElementById('chatName').textContent = currentChat.name;
  document.getElementById('chatStatus').textContent = currentChat.status;
  document.getElementById('chatAvatar').style.background = currentChat.color;
  document.getElementById('chatAvatar').textContent = currentChat.avatar;

  renderMessages();
  currentChat.unread = 0;

  setTimeout(() => {
    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;
  }, 50);
}

function goBack() {
  document.getElementById('chatView').classList.remove('active');
  document.getElementById('chatListView').classList.remove('hidden');
  renderChatList();
}

// ═══ RENDER MESSAGES ═══
function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = `<div class="date-sep"><span>Today</span></div>`;

  let lastSender = null;
  currentChat.messages.forEach((msg, i) => {
    const div = document.createElement('div');
    const isTail = (lastSender !== (msg.sent ? 'me' : 'them'));
    div.className = `msg ${msg.sent ? 'msg-sent' : 'msg-received'} ${isTail ? 'tail' : ''}`;

    let senderHtml = '';
    if (!msg.sent && msg.sender && isTail) {
      senderHtml = `<div class="msg-sender">${msg.sender}</div>`;
    }

    div.innerHTML = `
      ${senderHtml}
      <span class="msg-text">${msg.text.replace(/\n/g, '<br>')}</span>
      <span class="msg-meta">
        <span class="msg-time">${msg.time}</span>
        ${msg.sent ? '<span class="msg-ticks">✓✓</span>' : ''}
      </span>
    `;
    container.appendChild(div);
    lastSender = msg.sent ? 'me' : 'them';
  });
}

// ═══ SEND MESSAGE ═══
function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !currentChat) return;

  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });

  currentChat.messages.push({ text, sent: true, time });
  input.value = '';
  input.style.height = '24px';
  toggleSend();
  renderMessages();

  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;

  // Simulate reply after 1-2s
  if (currentChat.id === 2) {
    setTimeout(() => {
      const replies = [
        "Got it! Working on it... 🍣",
        "Done! ✅",
        "I'll handle that right away.",
        "Checking now...",
        "All sorted! Anything else?",
      ];
      const reply = replies[Math.floor(Math.random() * replies.length)];
      const replyTime = new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
      currentChat.messages.push({ text: reply, sent: false, time: replyTime });
      renderMessages();
      msgs.scrollTop = msgs.scrollHeight;
    }, 1000 + Math.random() * 1500);
  }
}

// ═══ INPUT HELPERS ═══
function autoGrow(el) {
  el.style.height = '24px';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function toggleSend() {
  const input = document.getElementById('msgInput');
  const container = document.getElementById('sendBtn');
  if (input.value.trim()) {
    container.classList.add('has-text');
  } else {
    container.classList.remove('has-text');
  }
}

// Enter to send
document.getElementById('msgInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Init
renderChatList();
</script>
